            _isWGOverlay: true,
          });
        }
      }
    }
  }
  // Recurse
  for (const child of (node.children || [])) {
    overlayWGProtection(child, protMap);
  }
  for (const child of (node._origChildren || [])) {
    overlayWGProtection(child, protMap);
  }
}

// Remove WG overlay nodes from a tree
function removeWGOverlay(node) {
  if (!node) return;
  if (node.children) {
    node.children = node.children.filter(c => !c._isWGOverlay);
    node.children.forEach(c => removeWGOverlay(c));
  }
  if (node._origChildren) {
    node._origChildren = node._origChildren.filter(c => !c._isWGOverlay);
    node._origChildren.forEach(c => removeWGOverlay(c));
  }
}

// Build CPU subsystem tree
function buildCPUTree(dtsRoot) {
  const all = [];
  flattenAllNodes(dtsRoot, all);

  // Find the cpus node and return its DTS subtree as-is
  const cpusNode = all.find(n => n.name === 'cpus' && n._path === '/cpus');
  if (!cpusNode) {
    return { name: 'CPU Subsystem', label: null, nodeType: 'cpu', properties: [], children: [], _origChildren: null, _path: '/__comp__/cpu' };
  }

  // Deep clone the cpus subtree
  function deepClone(node) {
    const c = cloneNode(node);
    const kids = node.children || node._origChildren || [];
    c.children = kids.map(k => deepClone(k));
    return c;
  }

  return deepClone(cpusNode);
}

// Build Peripheral tree
function buildPeripheralTree(dtsRoot) {
  const all = [];
  flattenAllNodes(dtsRoot, all);

  const groups = {
    'UART / Serial': [],
    'SPI': [],
    'DMA': [],
    'Ethernet': [],
    'Security (TRNG/Auth)': [],
    'Other': [],
  };

  for (const n of all) {
    const c = (n.properties.find(p => p.name === 'compatible') || {}).value || '';
    const nm = n.name.toLowerCase();
    if (c.includes('uart') || nm.includes('serial@')) groups['UART / Serial'].push(n);
    else if (c.includes('spi') && !c.includes('mmc-spi')) groups['SPI'].push(n);
    else if (c.includes('pdma') || (c.includes('dma') && !c.includes('shared-dma'))) groups['DMA'].push(n);
    else if (c.includes('ethernet') || c.includes('axi-ethernet') || c.includes('axidma') || c.includes('ethernet-phy') || nm.includes('mdio') || nm.includes('phy@')) groups['Ethernet'].push(n);
    else if (c.includes('trng') || c.includes('authentication')) groups['Security (TRNG/Auth)'].push(n);
    else if (c.includes('mmc')) groups['SPI'].push(n); // MMC under SPI
  }

  const children = [];
  for (const [gname, nodes] of Object.entries(groups)) {
    if (nodes.length === 0) continue;

    // For Ethernet, build sub-hierarchy from DTS tree
    if (gname === 'Ethernet') {
      const ethNodes = nodes;
      const clones = {};
      for (const n of ethNodes) {
        clones[n._path] = cloneNode(n);
      }
      const attached = new Set();
      // Attach children by DTS path
      for (const n of ethNodes) {
        const parentPath = n._path.replace(/\/[^/]+$/, '');
        const parent = ethNodes.find(p => p._path === parentPath);
        if (parent && parent !== n) {
          clones[parent._path].children.push(clones[n._path]);
          attached.add(n._path);
        }
      }
      const roots = ethNodes.filter(n => !attached.has(n._path)).map(n => clones[n._path]);
      children.push({
        name: `${gname} (${nodes.length})`, label: null, nodeType: 'default', properties: [],
        children: roots, _origChildren: null, _path: `/__comp__/periph/${gname}`,
      });
    } else {
      children.push({
        name: `${gname} (${nodes.length})`, label: null, nodeType: 'default', properties: [],
        children: nodes.map(n => cloneNode(n)), _origChildren: null,
        _path: `/__comp__/periph/${gname}`,
      });
    }
  }

  return {
    name: 'Peripherals',
    label: null, nodeType: 'default',
    properties: [],
    children, _origChildren: null,
    _path: '/__comp__/peripheral',
  };
}

const componentBuilders = {
  power: buildPowerTree,
  ras: buildRASTree,
  interrupt: buildInterruptTree,
  cache: buildCacheTree,
  trace: buildTraceTree,
  worldguard: buildWorldGuardTree,
  cpu: buildCPUTree,
  peripheral: buildPeripheralTree,
};

let isComponentView = false;
let dtsTreeRoot = null;
let layoutMode = 'tree'; // 'tree' | 'block'
let diffMode = false; // true when comparing two DTS sources

// ========== MAIN ==========
let currentRoot = null;

function doParse(src) {
  try {
    const parser = new DTSParser(src);
    parsedTree = parser.parse();
    labelMap = parser.labels;
    totalNodes = 0;
    allPhandles = [];
    diffMode = false;
    isComponentView = false;
    layoutMode = 'tree';
    document.getElementById('view-select').value = 'dts';
    document.getElementById('layout-select').value = 'tree';
    document.getElementById('layout-select').style.display = 'none';
    dtsTreeRoot = buildD3Data(parsedTree, '/', 0);
    currentRoot = dtsTreeRoot;
    collectPhandles(currentRoot);

    renderTree(currentRoot);
    renderLegend();

    // Show phandle panel info
    const phandelPanel = document.getElementById('phandle-panel');
    const phandelList = document.getElementById('phandle-list');
    if (allPhandles.length > 0) {
      // Show unique targets
      const targets = [...new Set(allPhandles.map(p => p.target))].sort();
      phandelList.innerHTML = targets.slice(0, 50).map(t =>
        `<span class="ref-item" data-target="${t}">&${t}</span>`
      ).join('') + (targets.length > 50 ? `<span style="color:#8b949e"> +${targets.length - 50} more</span>` : '');
      phandelPanel.classList.remove('hidden');

      phandelList.querySelectorAll('.ref-item').forEach(el => {
        el.addEventListener('click', () => navigateToLabel(el.dataset.target));
      });
    }
  } catch (e) {
    alert('Parse error: ' + e.message);
    console.error(e);
  }
}

// Compare two DTS sources and render a single merged, color-coded tree.
function doDiff(srcA, srcB) {
  try {
    const rawA = new DTSParser(srcA).parse();
    const rawB = new DTSParser(srcB).parse();
    labelMap = {};
    allPhandles = [];
    diffMode = true;
    isComponentView = false;
    layoutMode = 'tree';
    document.getElementById('view-select').value = 'dts';
    document.getElementById('layout-select').value = 'tree';
    document.getElementById('layout-select').style.display = 'none';
    dtsTreeRoot = buildDiffTree(rawA, rawB);
    currentRoot = dtsTreeRoot;
    collectPhandles(currentRoot);

    renderTree(currentRoot);
    renderLegend();
    document.getElementById('phandle-panel').classList.add('hidden');
  } catch (e) {
    alert('Diff parse error: ' + e.message);
    console.error(e);
  }
}

// Event handlers
document.getElementById('btn-parse').addEventListener('click', () => {
  const src = document.getElementById('dts-textarea').value.trim();
  if (!src) return;
  doParse(src);
});

document.getElementById('btn-diff').addEventListener('click', () => {
  const a = document.getElementById('dts-textarea').value.trim();
  const b = document.getElementById('dts-textarea-b').value.trim();
  if (!a || !b) { alert('Provide both Base (A) and Modified (B) DTS to compare.'); return; }
  doDiff(a, b);
});

document.getElementById('file-input-b').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => { document.getElementById('dts-textarea-b').value = ev.target.result; };
  reader.readAsText(file);
});

document.getElementById('btn-paste').addEventListener('click', () => {
  document.getElementById('input-panel').classList.remove('hidden');
  document.getElementById('tree-container').classList.add('hidden');
  document.getElementById('props-panel').classList.add('hidden');
  document.getElementById('phandle-panel').classList.add('hidden');
});

document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    doParse(ev.target.result);
  };
  reader.readAsText(file);
});

document.getElementById('search-input').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => searchNodes(e.target.value), 200);
});

document.getElementById('btn-expand-all').addEventListener('click', () => {
  if (!currentRoot) return;
  expandAll(currentRoot);
  refreshComponentView();
});

document.getElementById('btn-collapse').addEventListener('click', () => {
  if (!currentRoot) return;
  // First expand all, then collapse
  expandAll(currentRoot);
  collapseToDepth(currentRoot, 0, 2);
  refreshComponentView();
});

document.getElementById('btn-phandles').addEventListener('click', () => {
  showPhandles = !showPhandles;
  const btn = document.getElementById('btn-phandles');
  btn.style.background = showPhandles ? '#388bfd' : '';
  if (!currentRoot) return;
  if (!showPhandles) {
    treeGroup.select('.phandle-links').selectAll('*').remove();
    return;
  }
  if (layoutMode === 'block' && isComponentView) {
    drawPhandlesBlock();
  } else {
    const hierarchy = d3.hierarchy(currentRoot, d => d.children);
    drawPhandles(hierarchy.descendants());
  }
});

document.getElementById('btn-export-png').addEventListener('click', () => {
  downloadPNG();
});

function refreshComponentView() {
  treeGroup.selectAll('.node, .block, .link').remove();
  treeGroup.select('.phandle-links').selectAll('*').remove();
  if (layoutMode === 'block' && isComponentView) {
    renderBlockView(currentRoot);
  } else {
    updateTree(currentRoot);
  }
  renderLegend();
  setTimeout(zoomToFit, 100);
}

document.getElementById('view-select').addEventListener('change', (e) => {
  if (!dtsTreeRoot) { e.target.value = 'dts'; return; }
  const view = e.target.value;
  const wgLabel = document.getElementById('wg-toggle-label');
  const wgToggle = document.getElementById('wg-toggle');
  const layoutSel = document.getElementById('layout-select');

  if (view === 'dts') {
    isComponentView = false;
    currentRoot = dtsTreeRoot;
    wgLabel.style.display = 'none';
    layoutSel.style.display = 'none';
    layoutMode = 'tree'; // DTS view is tree-only
  } else if (view === 'worldguard') {
    isComponentView = true;
    currentRoot = componentBuilders[view](dtsTreeRoot);
    wgLabel.style.display = 'none';
    layoutSel.style.display = '';
  } else if (componentBuilders[view]) {
    isComponentView = true;
    currentRoot = componentBuilders[view](dtsTreeRoot);
    wgLabel.style.display = 'flex';
    layoutSel.style.display = '';
    if (wgToggle.checked) {
      const protMap = buildWGProtectionMap(dtsTreeRoot);
      overlayWGProtection(currentRoot, protMap);
    }
  }

  refreshComponentView();
});

document.getElementById('layout-select').addEventListener('change', (e) => {
  if (!isComponentView || !currentRoot) return;
  layoutMode = e.target.value === 'block' ? 'block' : 'tree';
  refreshComponentView();
});

document.getElementById('wg-toggle').addEventListener('change', (e) => {
  if (!currentRoot || !isComponentView) return;
  const view = document.getElementById('view-select').value;
  if (view === 'dts' || view === 'worldguard') return;

  // Rebuild the component tree fresh to avoid stale overlay
  currentRoot = componentBuilders[view](dtsTreeRoot);
  if (e.target.checked) {
    const protMap = buildWGProtectionMap(dtsTreeRoot);
    overlayWGProtection(currentRoot, protMap);
  }

  refreshComponentView();
});


// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement !== document.getElementById('search-input') && document.activeElement !== document.getElementById('dts-textarea')) {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search-input').value = '';
    searchNodes('');
    document.getElementById('search-input').blur();
  }
});
</script>
</body>
</html>
